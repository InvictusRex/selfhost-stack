services:
  scrutiny:
    image: ghcr.io/starosdev/scrutiny:latest

    container_name: scrutiny

    restart: unless-stopped

    privileged: true

    cap_add:
      - SYS_ADMIN
      - SYS_RAWIO

    ports:
      - "8085:8080"

    environment:
      TZ: Asia/Kolkata

    volumes:
      - /run/udev:/run/udev:ro
      - ./config:/opt/scrutiny/config
      - ./influxdb:/opt/scrutiny/influxdb

    devices:
      - /dev/sda:/dev/sda
      - /dev/sdb:/dev/sdb
      - /dev/sdc:/dev/sdc
      - /dev/nvme0:/dev/nvme0
